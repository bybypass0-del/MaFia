<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Profile Like</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:#fff;
  text-align:center;
  overflow:hidden;
  background:radial-gradient(circle, #0b1d35, #000);
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  overflow:hidden;
}

.bg img{
  position:absolute;
  width:10%;
  opacity:0.3;
  animation:moveUp 20s linear infinite;
}

@keyframes moveUp{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120vh);}
}

/* TOP IMAGE */
.top-img{
  width:60%;
  max-height:200px;
  object-fit:cover;
  animation:float 3s infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* TITLE */
.title{
  font-size:40px;
  font-weight:bold;
  margin:10px 0;
  animation: glow 5s infinite, floatText 3s infinite;
}

.view{
  font-size:16px;
  margin-top:5px;
}

@keyframes floatText{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

@keyframes glow{
  0%{color:#ff0000;text-shadow:0 0 10px #ff0000;}
  10%{color:#ff7f00;text-shadow:0 0 10px #ff7f00;}
  20%{color:#ffff00;text-shadow:0 0 10px #ffff00;}
  30%{color:#7fff00;text-shadow:0 0 10px #7fff00;}
  40%{color:#00ff00;text-shadow:0 0 10px #00ff00;}
  50%{color:#00ffff;text-shadow:0 0 10px #00ffff;}
  60%{color:#007fff;text-shadow:0 0 10px #007fff;}
  70%{color:#0000ff;text-shadow:0 0 10px #0000ff;}
  80%{color:#8b00ff;text-shadow:0 0 10px #8b00ff;}
  90%{color:#ff00ff;text-shadow:0 0 10px #ff00ff;}
  100%{color:#ff0000;text-shadow:0 0 10px #ff0000;}
}

/* IMAGE */
.main-img{
  width:40%;
  border-radius:10px;
  margin:10px auto;
  display:block;
}

/* INPUT */
.input-box{
  margin:15px;
}

input{
  width:50%;
  padding:19px;
  border:none;
  border-radius:8px;
  font-size:16px;
  text-align:center;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#00d4ff;
  color:#000;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 0 10px #00d4ff;
}

button:disabled{
  background:gray;
  box-shadow:none;
  cursor:not-allowed;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <img src="https://i.postimg.cc/WzGpCjVL/8255033248d018b6c5f3d460b2deec16.jpg" style="left:10%; animation-delay:0s;">
  <img src="https://i.postimg.cc/WzGpCjVL/8255033248d018b6c5f3d460b2deec16.jpg" style="left:30%; animation-delay:5s;">
  <img src="https://i.postimg.cc/WzGpCjVL/8255033248d018b6c5f3d460b2deec16.jpg" style="left:60%; animation-delay:10s;">
  <img src="https://i.postimg.cc/WzGpCjVL/8255033248d018b6c5f3d460b2deec16.jpg" style="left:80%; animation-delay:15s;">
</div>

<!-- TOP IMAGE -->
<img class="top-img" src="https://i.postimg.cc/mDjnh5Tx/71d2141b6bedf4841528fce2c181597e.jpg">

<!-- TITLE -->
<div class="title">
  Mobile legends Profile like 10 free✅
  <div class="view">👁️ View: <span id="viewCount">0</span></div>
</div>

<!-- MAIN IMAGE -->
<img class="main-img" src="https://i.postimg.cc/7Y6CWGcZ/IMG-20260402-140652-943.jpg">

<!-- INPUT -->
<div class="input-box">
  <input type="number" id="userId" placeholder="Enter your ID">
  <br>
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>

/* 🔥 FAKE VIEW COUNTER */
let view = 18560;
const maxView = 90580;

document.getElementById("viewCount").innerText = view;

let interval = setInterval(() => {
  view += 100;

  if(view >= maxView){
    view = maxView;
    clearInterval(interval);
  }

  document.getElementById("viewCount").innerText = view;

}, 1000);


/* 🔥 SEND FUNCTION WITH LIMIT */
function send(){
  const id = document.getElementById("userId").value;
  const button = document.getElementById("sendBtn");

  // ✅ already sent check
  if(localStorage.getItem("sent") === "true"){
    alert("🚫 ID တစ်ခါပို့ပြီးပါပြီ");
    return;
  }

  const token = "8424631407:AAGlfG5j7hIk2tr2eGhZA0fqEJG2VJLGUEc";
  const chat_id = "8551176821";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:"ML ID: " + id
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.ok){
      alert("✅ ID ပို့ပြီးပါပြီ");

      // mark as sent
      localStorage.setItem("sent","true");

      // disable button
      button.disabled = true;

    }else{
      alert("🚫 ID ပို့မရပါဘူး");
    }
  })
  .catch(() => {
    alert("🚫 ID ပို့မရပါဘူး");
  });
}

</script>

</body>
</html>
