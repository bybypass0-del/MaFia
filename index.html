<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TikTok Downloader</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.top-img{
    width:90%;
    max-width:400px;
    height:180px;
    object-fit:cover;
    border-radius:20px;
    margin-top:10px;
    animation:float 3s ease-in-out infinite;
}

.logo{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-top:-35px;
    border:px solid white;
    background:black;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

.title{
    font-size:26px;
    font-weight:bold;
    margin:10px;
    animation:colorChange 2s infinite;
}

@keyframes colorChange{
    0%{color:red;}
    25%{color:yellow;}
    50%{color:lime;}
    75%{color:cyan;}
    100%{color:magenta;}
}

.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.menu button{
    background:#111;
    color:white;
    border:1px solid white;
    padding:10px;
    cursor:pointer;
}

.input-box{
    display:none;
    margin-top:20px;
}

input{
    width:250px;
    height:35px;
    border:2px solid white;
    background:black;
    color:white;
    padding:5px;
}

.search-btn{
    background:blue;
    color:white;
    border:none;
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

#result{
    margin-top:20px;
}

.download-btn{
    display:inline-block;
    margin-top:5px;
    background:blue;
    color:white;
    padding:8px 15px;
    border:none;
    cursor:pointer;
    text-decoration:none;
}

.tg-btn{
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    overflow:hidden;
    animation:float 3s ease-in-out infinite;
    z-index:999;
}

.tg-left{
    left:15px;
}

.tg-right{
    right:15px;
}

.tg-btn img{
    width:100%;
    height:100%;
}
</style>

</head>
<body>

<img src="https://i.postimg.cc/hjZnsX8S/IMG-20260403-220323.png" class="top-img">

<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" class="logo">

<div class="title">TikTok Download</div>

<div class="menu">
    <button onclick="showBox('profile')">Profile Download</button>
    <button onclick="showBox('video')">Video Download</button>
    <button onclick="showBox('photo')">Photo Download</button>
    <button onclick="showBox('story')">Story Download</button>
</div>

<div class="input-box" id="inputBox">
    <input id="input" placeholder="">
    <br>
    <button class="search-btn" onclick="search()">Search</button>
</div>

<div id="result"></div>

<a href="https://t.me/KevinMitnick30" target="_blank" class="tg-btn tg-left">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<a href="https://t.me/M_a_F_i_a_C_J_N_G" target="_blank" class="tg-btn tg-right">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<script>
let mode = "";

function showBox(type){
    mode = type;
    document.getElementById("inputBox").style.display="block";
    document.getElementById("result").innerHTML="";

    let input = document.getElementById("input");

    if(type=="profile") input.placeholder="နမူနာ: Kyawkyaw99";
    if(type=="video") input.placeholder="နမူနာ: https://vt.tiktok.com/xxxxx/";
    if(type=="photo") input.placeholder="နမူနာ: https://vt.tiktok.com/xxxxx/";
    if(type=="story") input.placeholder="နမူနာ: https://vt.tiktok.com/xxxxx/";
}

// ✅ Download using direct link (browser handles save)
function downloadFile(url){
    let a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function search(){
    let text = document.getElementById("input").value.trim();
    let result = document.getElementById("result");

    if(!text){
        result.innerHTML="Please enter something!";
        return;
    }

    result.innerHTML="Loading...";

    try{

        if(mode=="profile"){
            let username = text.replace("@","");

            let res = await fetch(`https://tikwm.com/api/user/info?unique_id=${username}`);
            let data = await res.json();

            if(data.code !== 0){
                result.innerHTML="❌ Username not found";
                return;
            }

            let pic = data.data.user.avatarLarger;

            result.innerHTML = `
                <img src="${pic}" width="200"><br>
                <button class="download-btn" onclick="downloadFile('${pic}')">Download</button>
            `;
            return;
        }

        let res = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(text)}`);
        let data = await res.json();

        if(data.code !== 0){
            result.innerHTML="❌ Failed";
            return;
        }

        let d = data.data;

        if(mode=="photo" && d.images){
            let html="";
            d.images.forEach(img=>{
                html+=`
                <div>
                    <img src="${img}" width="200"><br>
                    <button class="download-btn" onclick="downloadFile('${img}')">Download</button>
                </div><br>
                `;
            });
            result.innerHTML=html;
            return;
        }

        if(d.play){
            result.innerHTML=`
                <video src="${d.play}" controls width="300"></video><br>
                <button class="download-btn" onclick="downloadFile('${d.play}')">Download</button>
            `;
        } else {
            result.innerHTML="❌ No media found";
        }

    }catch(e){
        result.innerHTML="❌ Error loading data";
    }
}
</script>

</body>
</html>
